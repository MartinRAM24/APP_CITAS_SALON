<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Cliente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            elegantPurple: '#7e57c2',
            podGreen: '#10b981',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-100 via-purple-100 to-pink-100">
  <main class="max-w-6xl mx-auto p-6">

    <!-- HEADER dinámico según tenant -->
    <header class="flex flex-wrap justify-between items-center gap-3 mb-6">
      <div class="flex items-center gap-3">
        <span id="tenantEmoji" class="text-3xl"></span>
        <div>
          <p id="tenantLabel" class="text-xs uppercase tracking-widest font-medium opacity-60"></p>
          <h1 id="pageTitle" class="text-2xl font-bold"></h1>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm text-slate-500">Hola, <span id="userName" class="font-medium text-slate-700"></span></span>
        <button id="logoutBtn" class="text-white px-4 py-2 rounded-lg text-sm transition hover:opacity-90" id="logoutBtn">Cerrar sesión</button>
      </div>
    </header>

    <!-- PRÓXIMA CITA -->
    <section id="summaryCard" class="rounded-xl p-5 shadow mb-6">
      <h2 class="text-lg font-semibold mb-1">Próxima cita</h2>
      <p id="nextAppointment" class="text-slate-700">Cargando...</p>
      <p class="mt-1 text-sm text-slate-500">Citas del día: <span id="todayCount" class="font-semibold">0</span></p>
    </section>

    <section class="grid md:grid-cols-2 gap-6">

      <!-- AGENDAR -->
      <article class="bg-white rounded-xl p-5 shadow">
        <h2 class="text-xl font-semibold mb-3">Agendar nueva cita</h2>
        <form id="appointmentForm" class="space-y-3">
          <select id="servicio" class="w-full border rounded-lg p-2" required>
            <option value="">Cargando servicios...</option>
          </select>
          <input id="fecha" type="date" class="w-full border rounded-lg p-2" required>
          <input id="hora" type="time" class="w-full border rounded-lg p-2" required>
          <button id="reservarBtn" class="w-full text-white py-2 rounded-lg transition hover:opacity-90">Reservar cita</button>
        </form>
        <p id="clientMsg" class="mt-3 text-sm font-medium"></p>
      </article>

      <!-- HISTORIAL -->
      <article class="bg-white rounded-xl p-5 shadow">
        <h2 class="text-xl font-semibold mb-3">Historial de citas</h2>
        <div class="overflow-auto max-h-96">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left border-b text-slate-500">
                <th class="pb-2">Servicio</th>
                <th class="pb-2">Fecha</th>
                <th class="pb-2">Hora</th>
                <th class="pb-2">Estado</th>
              </tr>
            </thead>
            <tbody id="appointmentsTable">
              <tr><td colspan="4" class="py-4 text-center text-slate-400">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </article>

    </section>
  </main>
  <script src="/static/cliente.js"></script>
</body>
</html>
